version: 2

models:
    - name: fact_sales
      description: Sales transaction fact table. One row per line item ordered includes product data
      columns:
        - name: OrderId
          description: Degenerate dimension for of the order.
          tests:
            #- unique
            - not_null
        - name: customerkey
          description: Dimension key for dim_customer
        - name: employeekey
          description: Dimension key for dim_employee
        - name: orderdatekey
          description: Dimension key for dim_date
        - name: productkey
          description: Dimension key for dim_product
        - name: quantity
          description: additive fact for total quantity of product on order
        - name: extendedpriceamount
          description: additive fact for total amount of product quantity * product price 
        - name: discountamount
          description: additive fact for extended price * discount
        - name: soldamount
          description: additive fact for extended price - discount amount
          
