version: 2

models:
  - name: stg_fm_orders
    description: "Staging model for FudgeMart orders with timestamp normalization"
    columns:
      - name: order_id
        description: "Raw FudgeMart order ID"
        tests:
          - not_null

      - name: customer_id
        description: "Raw FudgeMart customer ID"
        tests:
          - not_null

      - name: order_date
        description: "Order date converted from epoch microseconds to timestamp"
        tests:
          - not_null

      - name: shipped_date
        description: "Shipped date converted from epoch microseconds to timestamp"
