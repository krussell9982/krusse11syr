version: 2

models:
  - name: dim_customers      
    description: Customer Dimension. One row per customer
    columns:
      - name: customerkey
        description: "Surrogate key for the customer dimension"
        tests:
          - not_null
          - unique
      - name: source_customer_id
        description: "Original customer ID from the source system"
        tests:
          - not_null
      - name: source_system
        description: "Source system: FudgeFlix or FudgeMart"
        tests:
          - not_null
      - name: contact_first_name
        description: "Customer first name"
        tests:
          - not_null
      - name: contact_last_name
        description: "Customer last name"
        tests:
          - not_null
      - name: customer_address
        description: "Street address of the customer"
      - name: customer_city
        description: "City of the customer (from zip lookup for FudgeFlix, from fm_customers for FudgeMart)"
      - name: customer_state
        description: "State of the customer (from zip lookup for FudgeFlix, from fm_customers for FudgeMart)"
      - name: customer_postal_code
        description: "ZIP/postal code of the customer"
        tests:
          - not_null
      - name: customer_phone
        description: "Phone number of the customer (null for FudgeFlix)"
      - name: customer_email
        description: "Customer email address"
        tests:
          - not_null